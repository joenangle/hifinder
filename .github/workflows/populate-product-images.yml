name: Populate Product Images

on:
  schedule:
    # Run daily at 6am UTC (1am EST) — processes ~100 products per run
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  populate-images:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run image pipeline
        timeout-minutes: 20
        run: node scripts/populate-product-images.js --execute --limit 100
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Log completion
        run: |
          echo "Product image pipeline completed at $(date)"
          echo "Check Supabase Storage 'product-images' bucket for uploads"
