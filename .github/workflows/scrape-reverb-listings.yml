name: Scrape Reverb Active Listings

on:
  schedule:
    # Daily at 8am UTC (3am EST / 4am EDT) — 1hr after price guide
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  scrape-listings:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scrape Reverb Active Listings
        timeout-minutes: 20
        run: npm run scrape:reverb
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REVERB_API_TOKEN: ${{ secrets.REVERB_API_TOKEN }}

      - name: Log completion
        run: |
          echo "Reverb active listings scrape completed at $(date)"
